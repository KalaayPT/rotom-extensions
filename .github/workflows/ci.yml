name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  vscode:
    name: VS Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce package --out /tmp/rotom-vscode.vsix

  neovim:
    name: Neovim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y lua5.1
      - run: find editors/neovim -name '*.lua' -print0 | xargs -0 luac5.1 -p
