name: Publish VS Code

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        default: all
        type: choice
        options:
          - all
          - marketplace
          - open-vsx

permissions:
  contents: read

jobs:
  publish:
    name: Visual Studio Marketplace and Open VSX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: npm ci
      - run: npx @vscode/vsce package --out rotom-vscode.vsix
      - run: npx @vscode/vsce publish --packagePath rotom-vscode.vsix -p "$VSCE_PAT"
        if: github.event_name == 'release' || inputs.target == 'all' || inputs.target == 'marketplace'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - run: npx ovsx create-namespace Kalaay -p "$OVSX_PAT" || true
        if: github.event_name == 'release' || inputs.target == 'all' || inputs.target == 'open-vsx'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
      - run: npx ovsx publish rotom-vscode.vsix -p "$OVSX_PAT"
        if: github.event_name == 'release' || inputs.target == 'all' || inputs.target == 'open-vsx'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
